name: Deploy to Vercel (production)

on:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit/integration tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke E2E test
        run: pnpm exec playwright test tests/smoke/golden-path.spec.ts
        env:
          NEXT_PUBLIC_TRAVELPAYOUTS_MARKER: ${{ secrets.NEXT_PUBLIC_TRAVELPAYOUTS_MARKER }}

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment=production

      - name: Build via Vercel CLI
        run: pnpm dlx vercel build --prod
        env:
          NEXT_PUBLIC_TRAVELPAYOUTS_MARKER: ${{ secrets.NEXT_PUBLIC_TRAVELPAYOUTS_MARKER }}

      - name: Deploy prebuilt output
        run: pnpm dlx vercel deploy --prebuilt --prod
