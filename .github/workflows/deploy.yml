name: Deploy to Vercel (production)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run unit/integration tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke E2E test
        run: pnpm exec playwright test tests/smoke/golden-path.spec.ts
        env:
          NEXT_PUBLIC_TRAVELPAYOUTS_MARKER: ${{ secrets.NEXT_PUBLIC_TRAVELPAYOUTS_MARKER }}

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment=production

      - name: Build via Vercel CLI
        run: pnpm dlx vercel build --prod
        env:
          NEXT_PUBLIC_TRAVELPAYOUTS_MARKER: ${{ secrets.NEXT_PUBLIC_TRAVELPAYOUTS_MARKER }}

      - name: Deploy prebuilt output
        run: pnpm dlx vercel deploy --prebuilt --prod
